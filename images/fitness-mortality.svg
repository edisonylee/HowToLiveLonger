<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="720" height="400" fill="#ffffff"/>
  <text x="360" y="34" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">Cardiorespiratory fitness vs all-cause mortality</text>
  <text x="360" y="55" text-anchor="middle" font-size="12" fill="#777">Mandsager 2018, JAMA Netw Open · n = 122,007 · 8.4-yr median follow-up</text>

  <!-- Axes -->
  <line x1="100" y1="80" x2="100" y2="310" stroke="#444" stroke-width="1.3"/>
  <line x1="100" y1="310" x2="680" y2="310" stroke="#444" stroke-width="1.3"/>

  <!-- Gridlines + y-axis ticks. Scale: HR 0–5, plot region 230px tall, 1 HR = 46px. y0 (HR=0) = 310. -->
  <g font-size="11" fill="#888">
    <line x1="100" y1="264" x2="680" y2="264" stroke="#f1f1f1"/>
    <text x="92" y="268" text-anchor="end">1.0</text>
    <line x1="100" y1="218" x2="680" y2="218" stroke="#f1f1f1"/>
    <text x="92" y="222" text-anchor="end">2.0</text>
    <line x1="100" y1="172" x2="680" y2="172" stroke="#f1f1f1"/>
    <text x="92" y="176" text-anchor="end">3.0</text>
    <line x1="100" y1="126" x2="680" y2="126" stroke="#f1f1f1"/>
    <text x="92" y="130" text-anchor="end">4.0</text>
    <line x1="100" y1="80"  x2="680" y2="80"  stroke="#f1f1f1"/>
    <text x="92" y="84"  text-anchor="end">5.0</text>
    <text x="92" y="314" text-anchor="end">0</text>
  </g>

  <!-- Bars. HR values (Elite=1.0 referent): Low 5.04, Below avg ~2.75, Above avg ~2.08, High 1.30, Elite 1.0 -->
  <!-- Bar width 80, spacing centers at 160, 270, 380, 490, 600. y = 310 - HR*46. -->
  <rect x="120" y="78"  width="80" height="232" fill="#e76f51"/>
  <rect x="230" y="184" width="80" height="126" fill="#e9985a"/>
  <rect x="340" y="214" width="80" height="96"  fill="#f4a261"/>
  <rect x="450" y="250" width="80" height="60"  fill="#a8c686"/>
  <rect x="560" y="264" width="80" height="46"  fill="#2a9d8f"/>

  <!-- Bar value labels -->
  <g font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">
    <text x="160" y="72">5.04</text>
    <text x="270" y="178">2.75</text>
    <text x="380" y="208">2.08</text>
    <text x="490" y="244">1.30</text>
    <text x="600" y="258">1.00</text>
  </g>

  <!-- Bar category labels -->
  <g font-size="12" fill="#333" text-anchor="middle">
    <text x="160" y="330">Low</text>
    <text x="270" y="330">Below avg</text>
    <text x="380" y="330">Above avg</text>
    <text x="490" y="330">High</text>
    <text x="600" y="330">Elite</text>
  </g>

  <!-- X-axis label -->
  <text x="390" y="358" text-anchor="middle" font-size="12" fill="#666">Fitness tier (treadmill-tested)</text>

  <!-- Y-axis label -->
  <text x="34" y="195" text-anchor="middle" font-size="12" fill="#666" transform="rotate(-90 34 195)">HR for all-cause mortality (Elite = 1.0)</text>

  <!-- Annotation -->
  <text x="390" y="384" text-anchor="middle" font-size="11" fill="#999" font-style="italic">Effect size exceeds smoking, coronary artery disease, and diabetes in this study.</text>
</svg>
